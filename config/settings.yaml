# ============================================================
# AI Meeting Intelligence System — Settings
# ============================================================
# IMPORTANT: Never put passwords or webhook URLs here.
# Use environment variables for ALL secrets.
# See config/.env.example for environment variable names.
# ============================================================

watcher:
  # Absolute path to your OneDrive-synced recordings folder
  watch_path: "D:/Watch Files - For Meetings"
  # Wait this many seconds after a file appears before processing
  # (ensures OneDrive sync is fully complete)
  delay_seconds: 10

ollama:
  # Cloud Ollama model — high-accuracy structured extraction for meeting transcripts
  model: "gpt-oss:120b-cloud"
  base_url: "http://localhost:11434"
  # Low temperature = consistent, factual, non-creative output
  temperature: 0.1
  max_retries: 3
  # Seconds before giving up on a single LLM call
  timeout: 450
  # High cap so long meeting transcripts are not truncated unnecessarily.
  max_transcript_chars: 140000
  # Max output tokens sent to Ollama as num_predict.
  # IMPORTANT: The gpt-oss:120b-cloud proxy multiplies this value by 10 before forwarding
  # to the underlying model. The model hard limit is 131072 tokens.
  # Formula: num_predict x 10 <= 131072  -->  safe maximum = 13107
  # 13000 gives ample room for 20+ participants without truncating mid-JSON.
  num_predict: 13000
  # Hard ceiling enforced in code — num_predict is clamped to this before every request.
  # Set to the model's documented max output token limit.
  max_output_tokens: 131072

teams:
  # Set TEAMS_WEBHOOK_URL environment variable — do not put the URL here
  webhook_url: ""
  enabled: true

email:
  # Office 365 (default) — change to smtp.gmail.com / port 587 for Gmail
  smtp_host: "smtp.office365.com"
  smtp_port: 587
  use_tls: true
  sender_name: "AI Meeting System"
  # Set EMAIL_USERNAME and EMAIL_PASSWORD environment variables
  username: ""
  password: ""
  enabled: true
  recipients:
    - "team-lead@yourcompany.com"
    - "dev-team@yourcompany.com"
    # Add all team members who should receive the MOM email

# ============================================================
# Database — SQL Server (migrated from SQLite)
# Override any value via environment variables (see .env.example).
# Credentials must NEVER be placed here; use DB_USERNAME / DB_PASSWORD env vars.
# ============================================================
database:
  # SQL Server instance name shown in SSMS "Connect to Server" dialog
  server: "ICS-LT-H3J9R73\\SQLEXPRESS"
  # Target database (created by scripts/create_sqlserver_schema.sql)
  database: "MeetingSystem"
  # ODBC driver installed on this machine — check ODBC Data Sources (64-bit)
  # Common values: "ODBC Driver 17 for SQL Server" | "ODBC Driver 18 for SQL Server"
  driver: "ODBC Driver 17 for SQL Server"
  # true  = Windows Authentication (current Windows user; no username/password needed)
  # false = SQL Authentication (set DB_USERNAME and DB_PASSWORD env vars)
  trusted_connection: true
  username: ""   # Leave blank for Windows auth — set DB_USERNAME env var for SQL auth
  password: ""   # Leave blank for Windows auth — set DB_PASSWORD env var for SQL auth
  connection_timeout: 30

# Logging
log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR
log_file: "logs/meeting_system.log"

